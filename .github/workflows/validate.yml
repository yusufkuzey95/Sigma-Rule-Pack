name: Validate Sigma rules

# Run on every push and pull request so a broken rule is caught before it ships.
on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint Sigma rules (pySigma)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pySigma tooling
        run: pip install -r requirements.txt

      - name: Lint rules (fail on parsing errors and validation issues)
        run: sigma check --fail-on-issues rules/
